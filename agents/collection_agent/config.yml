agent:
  name: collection_agent
  mode:
    default: strict_collections
  # When true, intent/plan/response must come from LLM structured outputs.
  # Heuristic keyword fallbacks and deterministic response fallbacks are disabled.
  strict_llm_mode: true
  llm_planner_enabled: true
paths:
  data_dir: ./data
  runtime_dir: ./runtime
llm:
  enabled: true
  provider: groq
  model_name: llama-3.1-8b-instant
  max_new_tokens: 500
  temperature: 0.1
verification:
  # Fields expected from customer for successful verification.
  # Example strict set: [dob, phone, last4_pan, zip]
  required_fields:
    - dob
    - phone
  # If true, only fields present in challenge data are enforced.
  # If false, enforce required_fields even if challenge payload misses them.
  require_field_in_challenge: true
  # If true, memory-based match can set identity_verified=true before explicit verification tool calls.
  auto_verify_from_memory_evidence: false
  # If true, memory-based verification also requires extracted customer name to match active customer name.
  require_name_match_for_auto_verify: false
  # If true, pre-graph memory reconciliation will never set identity_verified=true;
  # only verify_dob / verify_mobile tool results can verify identity.
  tool_only_verification: true
  # If true, verify from memory challenge snapshot first using extracted verification entities.
  # Keep false for strict tool-driven verification progression.
  prefer_memory_verify: false
  # If memory verification is failed/insufficient, fallback to database-backed verify_dob/verify_mobile checks.
  fallback_to_database_verify: false
  # If false, do not call database verify when entities are still incomplete (prevents unnecessary failed attempts).
  fallback_on_insufficient_entities: false
voice_runtime:
  provider: nvidia
  stt_model: nvidia_default
  tts_model: nvidia_default
  tts_voice: nvidia_default
  pipecat:
    enabled: true
    vad_enabled: true
    audio_in_sample_rate: 16000
    audio_out_sample_rate: 24000
tracing:
  jsonl_path: ./runtime/traces/events.jsonl
demo:
  agent_hop_soft_cap: 10
  agent_hop_hard_cap: 50
  channels:
    - sms
    - voice
